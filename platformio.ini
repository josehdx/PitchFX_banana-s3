; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-banana-leaf]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = bpi_leaf_s3
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
lib_deps = 
	tttapa/Control Surface@^2.1.0
	bodmer/TFT_eSPI@^2.5.43
build_flags = 
	-O3
	-ffast-math
	
	
	-D ARDUINO_USB_MODE=0
	-D CORE_DEBUG_LEVEL=0
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D USB_MANUFACTURER="\"Whammy_S3\""
	-D USB_PRODUCT="\"Whammy_S3\""
	
	-D CONFIG_ARDUINO_LOOP_STACK_SIZE=16384
	
	-fsingle-precision-constant
	
	-I lib/esp-dsp/modules/fft/include
	-I lib/esp-dsp/modules/common/include
	-I lib/esp-dsp/modules/math/include
	-I lib/esp-dsp/modules/wind/include
